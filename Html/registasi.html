    <div class="form-container">
    <h1 style="text-align: center; color: #6c5ce7; margin-bottom: 20px;">Join V-Phone Club</h1>
    
    <form id="registrationForm" novalidate> <div class="input-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" placeholder="Min. 5 characters">
            <span class="error-text" id="username-error"></span> </div>

        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="example@gmail.com">
            <span class="error-text" id="email-error"></span> </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Enter password">
            <span class="error-text" id="password-error"></span> </div>

        <div class="input-group">
            <label for="confpassword">Confirm Password</label>
            <input type="password" name="confpassword" id="confpassword" placeholder="Re-type password">
            <span class="error-text" id="confpassword-error"></span> </div>

        <div class="input-group">
            <label>Gender</label>
            <div class="radio-row" style="display:flex; gap: 15px; margin-top: 5px;">
                <label><input type="radio" name="gender" id="male" value="male"> Male</label>
                <label><input type="radio" name="gender" id="female" value="female"> Female</label>
            </div>
            <span class="error-text" id="gender-error"></span> </div>

        <div class="input-group">
            <label for="dob">Date of Birth</label>
            <input type="date" name="dob" id="dob">
            <span class="error-text" id="dob-error"></span> </div>

        <div class="button-container">
            <button type="submit">Sign Up</button>
        </div>
    </form>
</div>
